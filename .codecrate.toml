[codecrate]
output = "context_archledger.md"
keep_docstrings = true
dedupe = true
respect_gitignore = true
# exclude = ["*/.venv/*", "integration_tests", "examples", "docs"]
gitignore_allow = ["archledger/_version.py"]
exclude = ["*/.venv/*", "integration_tests", "todo.md", ".releaseledger"]
include = [
  "**/*.py",
  "**/*.toml",
  "**/*.yaml",
  "**/*.yml",
  "**/*.json",
  "**/*.rst",
  "**/*.md",
  "**/*.typed",
  "**/*.js",
  "**/*.css",
  "**/*.j2",
  "**/*.feature",
]
split_max_chars = 0
manifest = false
layout = "full"
profile = "portable-agent"
emit_standalone_unpacker = true
